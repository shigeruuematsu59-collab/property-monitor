<style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const opt = {responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}};
new Chart(document.getElementById("c1"),{type:"line",data:{labels:["2026-05-13", "2026-05-16", "2026-05-17", "2026-05-18"],datasets:[{label:"掲載件数",data:[13, 8, 6, 6],borderColor:"#2980b9",fill:true,backgroundColor:"#2980b910",tension:0.3}]},options:{...opt,plugins:{...opt.plugins,title:{display:true,text:"掲載件数推移"}}}});
